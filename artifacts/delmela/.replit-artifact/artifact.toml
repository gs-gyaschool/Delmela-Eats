kind = "web"
previewPath = "/"
title = "Delmela Café and Restaurant"
version = "1.0.0"
id = "artifacts/delmela"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25324

[services.development]
run = "pnpm --filter @workspace/delmela run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/delmela", "run", "build" ]
publicDir = "artifacts/delmela/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25324"
BASE_PATH = "/"
